  <path d="M22 26 L32 6 L42 24" fill="#EF9F27" stroke="#2C2C2A" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M74 26 L64 6 L54 24" fill="#EF9F27" stroke="#2C2C2A" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- rosto amber -->
  <circle cx="48" cy="58" r="34" fill="#EF9F27"/>
  <!-- olhos (branco sólido) -->
  <ellipse cx="35" cy="50" rx="9.5" ry="10.5" fill="#FFFFFF"/>
  <ellipse cx="61" cy="50" rx="9.5" ry="10.5" fill="#FFFFFF"/>
