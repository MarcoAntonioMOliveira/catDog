  <circle cx="35" cy="51" r="5.5" fill="#1D9E75"/>
  <circle cx="61" cy="51" r="5.5" fill="#EF9F27"/>
  <!-- íris -->
  <circle cx="37.5" cy="48.5" r="2.2" fill="#2C2C2A"/>
  <circle cx="63.5" cy="48.5" r="2.2" fill="#2C2C2A"/>
  <!-- brilho -->
  <circle cx="39.2" cy="46.8" r="1" fill="#FFFFFF"/>
  <circle cx="65.2" cy="46.8" r="1" fill="#FFFFFF"/>
  <!-- nariz coral -->
  <path d="M43 61 L48 66 L53 61 Q48 57.5 43 61Z" fill="#D85A30"/>
  <!-- bigodes -->
  <line x1="6"  y1="58" x2="33" y2="63" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6"  y1="65" x2="33" y2="65" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="90" y1="58" x2="63" y2="63" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="90" y1="65" x2="63" y2="65" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- sorriso -->
  <path d="M40 76 Q48 84 56 76" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
